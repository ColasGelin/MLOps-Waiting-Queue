<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <span class="pulse-dot"></span>
      <span class="header-title">QUEUE MONITOR</span>
    </div>
    <div class="header-right">
      <span class="header-clock" id="clock">00:00:00</span>
    </div>
  </header>

  <!-- ── Main layout ─────────────────────────────────────── -->
  <main class="main">

    <!-- Left: Video + metrics bar -->
    <section class="video-section">
      <div class="video-container">
        <img id="video-feed" src="/video" alt="Live feed" />
        <!-- High-urgency popup overlay -->
        <div id="popup" class="popup popup-hidden"></div>
      </div>
      <div class="metrics-bar">
        <div class="metrics-row" id="checkouts-row">

          <!-- All 4 checkouts always visible; dot is green=open, red=closed -->
          <div class="mblock" id="mblock-co1">
            <div class="mblock-label-row">
              <span class="checkout-dot" id="dot-co1"></span>
              <div class="mblock-label">Checkout 1</div>
            </div>
            <div class="mblock-main" id="m-lane1">0 <span class="mblock-unit">waiting</span></div>
            <div class="mblock-sub" id="m-lane1-sub">avg wait —</div>
          </div>

          <div class="metric-sep"></div>

          <div class="mblock" id="mblock-co2">
            <div class="mblock-label-row">
              <span class="checkout-dot" id="dot-co2"></span>
              <div class="mblock-label">Checkout 2</div>
            </div>
            <div class="mblock-main" id="m-lane2">0 <span class="mblock-unit">waiting</span></div>
            <div class="mblock-sub" id="m-lane2-sub">avg wait —</div>
          </div>

          <div class="metric-sep"></div>

          <div class="mblock" id="mblock-co3">
            <div class="mblock-label-row">
              <span class="checkout-dot" id="dot-co3"></span>
              <div class="mblock-label">Checkout 3</div>
            </div>
            <div class="mblock-main" id="m-lane3">0 <span class="mblock-unit">waiting</span></div>
            <div class="mblock-sub" id="m-lane3-sub">simulated</div>
          </div>

          <div class="metric-sep"></div>

          <div class="mblock" id="mblock-co4">
            <div class="mblock-label-row">
              <span class="checkout-dot" id="dot-co4"></span>
              <div class="mblock-label">Checkout 4</div>
            </div>
            <div class="mblock-main" id="m-lane4">0 <span class="mblock-unit">waiting</span></div>
            <div class="mblock-sub" id="m-lane4-sub">simulated</div>
          </div>

          <!-- Spacer pushes Avg Wait + In Store to the right -->
          <div class="metrics-spacer"></div>

          <div class="metric-sep"></div>

          <div class="mblock">
            <div class="mblock-label">Avg Wait</div>
            <div class="mblock-main" id="m-total-wait">— <span class="mblock-unit">seconds</span></div>
            <div class="mblock-sub">all queues</div>
          </div>

          <div class="metric-sep"></div>

          <div class="mblock">
            <div class="mblock-label">In Store</div>
            <div class="mblock-main" id="m-store">0</div>
            <div class="mblock-sub" id="m-trend">→ stable</div>
          </div>

          <div class="metric-sep"></div>

          <div class="mblock mblock-status">
            <div class="mblock-label">System</div>
            <div class="mblock-main status-row">
              <span class="status-dot" id="status-dot"></span>
              <span id="m-status">MONITORING</span>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- Right: Agent decisions panel -->
    <aside class="events-panel">
      <div class="events-header">
        <h2>Agent Suggestions</h2>
        <span class="event-count" id="event-count">0 events</span>
      </div>
      <div class="cards-container" id="cards"></div>
    </aside>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
